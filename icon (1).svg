<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </linearGradient>
    <linearGradient id="r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#ff8fa3"/>
    </linearGradient>
    <linearGradient id="y" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ffe599"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 3x3 grid of blocks -->
  <rect x="56"  y="56"  width="120" height="120" rx="18" fill="url(#r)" filter="url(#glow)"/>
  <rect x="196" y="56"  width="120" height="120" rx="18" fill="url(#y)" filter="url(#glow)"/>
  <rect x="336" y="56"  width="120" height="120" rx="18" fill="#1e1e38" opacity="0.6"/>
  <rect x="56"  y="196" width="120" height="120" rx="18" fill="#1e1e38" opacity="0.6"/>
  <rect x="196" y="196" width="120" height="120" rx="18" fill="url(#g)" filter="url(#glow)"/>
  <rect x="336" y="196" width="120" height="120" rx="18" fill="url(#r)" filter="url(#glow)"/>
  <rect x="56"  y="336" width="120" height="120" rx="18" fill="url(#y)" filter="url(#glow)"/>
  <rect x="196" y="336" width="120" height="120" rx="18" fill="#1e1e38" opacity="0.6"/>
  <rect x="336" y="336" width="120" height="120" rx="18" fill="url(#g)" filter="url(#glow)"/>
  <!-- highlight shine on colored blocks -->
  <rect x="68"  y="64"  width="50" height="20" rx="6" fill="white" opacity="0.2"/>
  <rect x="208" y="64"  width="50" height="20" rx="6" fill="white" opacity="0.2"/>
  <rect x="208" y="204" width="50" height="20" rx="6" fill="white" opacity="0.2"/>
  <rect x="348" y="204" width="50" height="20" rx="6" fill="white" opacity="0.2"/>
  <rect x="68"  y="344" width="50" height="20" rx="6" fill="white" opacity="0.2"/>
  <rect x="348" y="344" width="50" height="20" rx="6" fill="white" opacity="0.2"/>
</svg>
